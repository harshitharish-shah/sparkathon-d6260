<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promotion Intelligence Platform</title>
<style>
:root{
  --bg:#eef0f6; --panel:#ffffff; --panel-2:#f5f6fb; --panel-3:#eceef7;
  --sidebar:#151827; --sidebar-2:#1d2133; --sidebar-ink:#c7cbe0; --sidebar-ink-2:#8188a6;
  --border:#e2e5f0; --border-strong:#cfd3e4;
  --ink:#1a1d29; --ink-2:#5a6076; --ink-3:#8a90a6;
  --accent:#5145e6; --accent-2:#7c3aed; --accent-soft:#5145e615;
  --ready:#15a34a; --ready-bg:#15a34a18; --dev:#c07a09; --dev-bg:#d9770617;
  --not:#dc2626; --not-bg:#dc262617; --insuf:#5b6bd6; --insuf-bg:#5b6bd617;
  --live:#0e9f6e; --live-bg:#0e9f6e18; --mock:#b06a12; --mock-bg:#f59e0b1f; --cfg:#64748b; --cfg-bg:#64748b1a;
  --shadow:0 1px 2px rgba(20,24,45,.05),0 6px 20px rgba(20,24,45,.06);
  --shadow-lg:0 12px 40px rgba(20,24,45,.16);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,sans-serif;
  --mono:ui-monospace,"Cascadia Code","SF Mono",Consolas,monospace;
  --r:12px;
}
:root[data-theme="dark"]{
  --bg:#0b0d14; --panel:#141824; --panel-2:#1b2030; --panel-3:#222839;
  --sidebar:#0a0c13; --sidebar-2:#161b2a; --sidebar-ink:#c1c6df; --sidebar-ink-2:#767 da0;
  --sidebar-ink-2:#767da0;
  --border:#262d40; --border-strong:#333c54;
  --ink:#e7e9f2; --ink-2:#9aa1b8; --ink-3:#6b7291;
  --accent:#8b8bff; --accent-2:#b49bff; --accent-soft:#8b8bff1c;
  --ready:#4ade80; --ready-bg:#22c55e1e; --dev:#fbbf24; --dev-bg:#eab3081e;
  --not:#f87171; --not-bg:#ef44441e; --insuf:#98a2f2; --insuf-bg:#6366f124;
  --live:#34d399; --live-bg:#0e9f6e24; --mock:#fbbf5a; --mock-bg:#f59e0b22; --cfg:#94a0b8; --cfg-bg:#64748b26;
  --shadow:0 1px 2px rgba(0,0,0,.35),0 8px 26px rgba(0,0,0,.4);
  --shadow-lg:0 16px 50px rgba(0,0,0,.55);
}
@media (prefers-color-scheme:dark){:root:not([data-theme="light"]){
  --bg:#0b0d14; --panel:#141824; --panel-2:#1b2030; --panel-3:#222839;
  --sidebar:#0a0c13; --sidebar-2:#161b2a; --sidebar-ink:#c1c6df; --sidebar-ink-2:#767da0;
  --border:#262d40; --border-strong:#333c54;
  --ink:#e7e9f2; --ink-2:#9aa1b8; --ink-3:#6b7291;
  --accent:#8b8bff; --accent-2:#b49bff; --accent-soft:#8b8bff1c;
  --ready:#4ade80; --ready-bg:#22c55e1e; --dev:#fbbf24; --dev-bg:#eab3081e;
  --not:#f87171; --not-bg:#ef44441e; --insuf:#98a2f2; --insuf-bg:#6366f124;
  --live:#34d399; --live-bg:#0e9f6e24; --mock:#fbbf5a; --mock-bg:#f59e0b22; --cfg:#94a0b8; --cfg-bg:#64748b26;
  --shadow:0 1px 2px rgba(0,0,0,.35),0 8px 26px rgba(0,0,0,.4);
  --shadow-lg:0 16px 50px rgba(0,0,0,.55);
}}
*{margin:0;padding:0;box-sizing:border-box}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.app{display:grid;grid-template-columns:236px 1fr;grid-template-rows:56px 1fr;height:100vh;overflow:hidden}

/* ---------- top bar ---------- */
.topbar{grid-column:1/3;grid-row:1;display:flex;align-items:center;gap:14px;padding:0 18px;background:var(--panel);border-bottom:1px solid var(--border);z-index:30}
.brand{display:flex;align-items:center;gap:10px;width:206px;flex:0 0 auto}
.brand .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px}
.brand .bt{font-weight:700;font-size:14px;letter-spacing:-.01em;line-height:1.1}
.brand .bs{font-size:9.5px;color:var(--ink-3);letter-spacing:.04em;text-transform:uppercase}
.search{position:relative;flex:1;max-width:440px}
.search input{width:100%;background:var(--panel-2);border:1px solid var(--border);border-radius:9px;padding:8px 12px 8px 34px;font-size:13px;color:var(--ink)}
.search input:focus{outline:none;border-color:var(--accent);background:var(--panel)}
.search svg{position:absolute;left:10px;top:9px;color:var(--ink-3)}
.search-drop{position:absolute;top:42px;left:0;right:0;background:var(--panel);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-lg);max-height:320px;overflow:auto;display:none;z-index:40}
.search-drop.show{display:block}
.search-drop a{display:flex;justify-content:space-between;gap:8px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px}
.search-drop a:hover{background:var(--panel-2)}.search-drop a:last-child{border:none}
.topbar .spacer{flex:1}
.iconbtn{position:relative;width:36px;height:36px;border-radius:9px;border:1px solid transparent;background:transparent;color:var(--ink-2);display:flex;align-items:center;justify-content:center;cursor:pointer}
.iconbtn:hover{background:var(--panel-2);color:var(--ink)}
.iconbtn .dot{position:absolute;top:6px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--not);border:1.5px solid var(--panel)}
.assistant-btn{display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:none;border-radius:9px;padding:8px 13px;font-size:12.5px;font-weight:600;cursor:pointer}
.assistant-btn:hover{filter:brightness(1.07)}
.user{display:flex;align-items:center;gap:8px;padding-left:6px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.role-sel{background:var(--panel-2);border:1px solid var(--border);border-radius:8px;color:var(--ink-2);font-size:12px;padding:6px 8px}

/* ---------- sidebar ---------- */
.sidebar{grid-column:1;grid-row:2;background:var(--sidebar);color:var(--sidebar-ink);overflow-y:auto;display:flex;flex-direction:column;padding:12px 10px}
.nav-group{font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--sidebar-ink-2);padding:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;cursor:pointer;color:var(--sidebar-ink);font-size:13px;font-weight:500;margin-bottom:1px}
.nav-item:hover{background:var(--sidebar-2)}
.nav-item.active{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#fff;font-weight:600;box-shadow:0 4px 14px -4px var(--accent)}
.nav-item svg{flex:0 0 auto;opacity:.9}
.nav-item .badge{margin-left:auto;background:var(--sidebar-2);color:var(--sidebar-ink);font-size:10px;font-weight:700;padding:1px 7px;border-radius:9px}
.nav-item.active .badge{background:rgba(255,255,255,.22);color:#fff}
.sidebar .foot{margin-top:auto;padding:12px;font-size:10.5px;color:var(--sidebar-ink-2);line-height:1.5}
.themetoggle{display:flex;align-items:center;gap:7px;background:var(--sidebar-2);border:none;color:var(--sidebar-ink);border-radius:8px;padding:8px 10px;font-size:11.5px;cursor:pointer;width:100%;margin-bottom:8px}

/* ---------- main ---------- */
.main{grid-column:2;grid-row:2;overflow-y:auto;padding:22px 26px 60px}
.page-head{display:flex;align-items:flex-end;gap:14px;margin-bottom:6px;flex-wrap:wrap}
.page-head h1{font-size:22px;font-weight:750;letter-spacing:-.02em}
.page-head p{color:var(--ink-2);font-size:13px;margin-bottom:2px}
.crumb{font-size:11.5px;color:var(--ink-3);margin-bottom:10px}
.crumb b{color:var(--ink-2)}
.mockbanner{display:flex;align-items:center;gap:10px;background:var(--mock-bg);border:1px solid #f59e0b40;border-radius:10px;padding:9px 14px;font-size:12px;color:var(--ink);margin-bottom:18px}
.mockbanner b{color:var(--mock)}

/* generic layout */
.row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.grid{display:grid;gap:16px;margin-bottom:16px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}.g5{grid-template-columns:repeat(5,1fr)}.g6{grid-template-columns:repeat(6,1fr)}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:16px 17px;box-shadow:var(--shadow)}
.card h3{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-2);font-weight:650;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card h3 .r{margin-left:auto;display:flex;gap:5px}
.kpi{padding:15px 16px}
.kpi .v{font-size:27px;font-weight:750;letter-spacing:-.02em;line-height:1}
.kpi .l{font-size:11.5px;color:var(--ink-2);margin-top:6px}
.kpi .d{font-size:10.5px;margin-top:5px}
.kpi .ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:11px;background:var(--accent-soft);color:var(--accent)}

/* source chips */
.src{font-size:9px;font-weight:700;letter-spacing:.03em;padding:2px 6px;border-radius:5px;text-transform:uppercase;white-space:nowrap;font-family:var(--mono)}
.src-live{background:var(--live-bg);color:var(--live)}
.src-mock{background:var(--mock-bg);color:var(--mock)}
.src-cfg{background:var(--cfg-bg);color:var(--cfg)}

/* pills */
.pill{display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:650;white-space:nowrap}
.p-ready{background:var(--ready-bg);color:var(--ready)}.p-dev{background:var(--dev-bg);color:var(--dev)}
.p-not{background:var(--not-bg);color:var(--not)}.p-insuf{background:var(--insuf-bg);color:var(--insuf)}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10.5px;font-weight:600;background:var(--panel-3);color:var(--ink-2);margin:2px 3px 2px 0}
.tag-r{background:var(--not-bg);color:var(--not)}.tag-g{background:var(--ready-bg);color:var(--ready)}.tag-a{background:var(--accent-soft);color:var(--accent)}

/* tables */
.tw{overflow-x:auto;border:1px solid var(--border);border-radius:var(--r);background:var(--panel);box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
thead th{text-align:left;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-2);font-weight:650;padding:11px 13px;border-bottom:1px solid var(--border-strong);background:var(--panel-2);white-space:nowrap}
tbody td{padding:10px 13px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr.clk{cursor:pointer}tbody tr.clk:hover td{background:var(--panel-2)}
.num{font-variant-numeric:tabular-nums}
.emp{display:flex;align-items:center;gap:9px}
.emp .av{width:30px;height:30px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex:0 0 auto}
.emp .nm{font-weight:600}.emp .rl{font-size:11px;color:var(--ink-3)}

/* bars */
.bar{height:7px;border-radius:4px;background:var(--panel-3);overflow:hidden;min-width:60px}
.bar i{display:block;height:100%;border-radius:4px}
.scorecell{display:flex;align-items:center;gap:8px}
.scorecell b{min-width:30px;font-variant-numeric:tabular-nums}

/* filters */
.filters{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px}
.filters select{background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--ink);font-size:12.5px;padding:7px 11px}
.filters select:focus{outline:none;border-color:var(--accent)}

/* buttons */
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12.5px;font-weight:600;cursor:pointer}
.btn:hover{filter:brightness(1.07)}
.btn.ghost{background:transparent;border:1px solid var(--border-strong);color:var(--ink-2)}
.btn.ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn.sm{padding:5px 10px;font-size:11.5px}
.actbtns{display:flex;gap:6px;flex-wrap:wrap}

/* sub-tabs */
.subtabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px;overflow-x:auto}
.subtab{padding:9px 14px;cursor:pointer;font-size:13px;color:var(--ink-2);border-bottom:2px solid transparent;white-space:nowrap;font-weight:500}
.subtab:hover{color:var(--ink)}.subtab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:650}

/* misc */
.donut{width:104px;height:104px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;margin:2px auto}
.donut::before{content:'';position:absolute;inset:12px;background:var(--panel);border-radius:50%}
.donut .dv{position:relative;font-size:24px;font-weight:750}
.ai{background:linear-gradient(135deg,var(--accent-soft),transparent);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:10px;padding:13px 15px}
.ai h4{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.ai p{font-size:13px;line-height:1.55}
.list-item{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--border)}
.list-item:last-child{border:none}
.li-ic{width:32px;height:32px;border-radius:8px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:var(--panel-3);color:var(--ink-2)}
.li-t{font-size:13px;font-weight:550}.li-s{font-size:11px;color:var(--ink-3)}
.li-meta{margin-left:auto;font-size:11px;color:var(--ink-3);text-align:right}
.evi{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:12.5px}
.evi:last-child{border:none}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--ink-2);margin-top:10px}
.legend span{display:flex;align-items:center;gap:5px}.sw{width:11px;height:11px;border-radius:3px;display:inline-block}
.note{font-size:11px;color:var(--ink-3);font-style:italic;margin-top:9px}
.spider-wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.heat td{text-align:center;font-weight:600;font-size:11.5px;border:1px solid var(--bg)}
.heat th{font-size:10px}.heat .rk{text-align:left;color:var(--ink)}
.ninebox{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,90px);gap:6px;margin-top:8px}
.nb{border:1px solid var(--border);border-radius:8px;padding:7px;position:relative;font-size:9.5px;color:var(--ink-3);overflow:hidden}
.nb .chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.nb .ch{width:22px;height:22px;border-radius:50%;background:var(--accent-soft);color:var(--accent);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
.nb-hi{background:var(--ready-bg)}.nb-md{background:var(--dev-bg)}.nb-lo{background:var(--not-bg)}

/* slide-over assistant */
.overlay{position:fixed;inset:0;background:rgba(10,12,20,.5);z-index:60;display:none}
.overlay.show{display:block}
.slideover{position:fixed;top:0;right:0;width:400px;max-width:92vw;height:100vh;background:var(--panel);border-left:1px solid var(--border);box-shadow:var(--shadow-lg);z-index:70;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s}
.slideover.show{transform:translateX(0)}
.so-head{padding:15px 17px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
.so-head .t{font-weight:700}.so-head .s{font-size:11px;color:var(--ink-3)}
.so-body{flex:1;overflow-y:auto;padding:16px 17px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:88%;padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.5}
.msg.u{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:3px}
.msg.a{align-self:flex-start;background:var(--panel-2);border:1px solid var(--border);border-bottom-left-radius:3px}
.msg.a b{color:var(--accent)}
.so-sug{display:flex;flex-direction:column;gap:6px}
.so-sug button{text-align:left;background:var(--panel-2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;font-size:12px;color:var(--ink);cursor:pointer}
.so-sug button:hover{border-color:var(--accent);color:var(--accent)}
.so-foot{padding:12px 15px;border-top:1px solid var(--border);display:flex;gap:8px}
.so-foot input{flex:1;background:var(--panel-2);border:1px solid var(--border);border-radius:9px;padding:9px 12px;font-size:13px;color:var(--ink)}
.so-foot input:focus{outline:none;border-color:var(--accent)}

/* modal */
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.96);width:460px;max-width:92vw;background:var(--panel);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);z-index:70;display:none;overflow:hidden}
.modal.show{display:block;animation:pop .18s ease-out forwards}
@keyframes pop{to{transform:translate(-50%,-50%) scale(1)}}
.modal .mh{padding:16px 18px;border-bottom:1px solid var(--border);font-weight:700;display:flex;align-items:center;justify-content:space-between}
.modal .mb{padding:16px 18px}
.exp-item{display:flex;align-items:center;gap:11px;padding:11px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer}
.exp-item:hover{border-color:var(--accent);background:var(--panel-2)}
.dropdown{position:absolute;top:46px;right:0;width:330px;background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);z-index:50;display:none;overflow:hidden}
.dropdown.show{display:block}
.dropdown .dh{padding:12px 15px;border-bottom:1px solid var(--border);font-weight:700;font-size:13px;display:flex;justify-content:space-between}
.dropdown .di{padding:11px 15px;border-bottom:1px solid var(--border);display:flex;gap:10px;font-size:12.5px}
.dropdown .di:last-child{border:none}
.dropdown .di .di-ic{width:30px;height:30px;border-radius:8px;flex:0 0 auto;display:flex;align-items:center;justify-content:center}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);z-index:90;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:1150px){.g6{grid-template-columns:repeat(3,1fr)}.g5{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{display:none}.topbar{grid-column:1}.main{grid-column:1}.g3,.g2{grid-template-columns:1fr}}
@media print{.topbar,.sidebar,.mockbanner,.filters,.actbtns,.subtabs{display:none!important}.app{display:block;height:auto}.main{overflow:visible;padding:0}}
</style>
</head>
<body>
<div class="app">
  <!-- TOP BAR -->
  <header class="topbar">
    <div class="brand">
      <div class="logo">PI</div>
      <div><div class="bt">Promotion Intelligence</div><div class="bs">Talent Decision Platform</div></div>
    </div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="globalSearch" placeholder="Search employees, teams, roles…" autocomplete="off">
      <div class="search-drop" id="searchDrop"></div>
    </div>
    <div class="spacer"></div>
    <a class="iconbtn" id="helpBtn" href="help-doc.html" target="_blank" rel="noopener" title="Help &amp; Reference Guide" style="text-decoration:none"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M9.4 9.2a2.6 2.6 0 1 1 3.6 2.4c-.7.4-1 1-1 1.7v.3"/><circle cx="12" cy="17.2" r=".6" fill="currentColor" stroke="none"/></svg></a>

function series(r,base,trend,n,spread){const out=[];for(let i=0;i<n;i++){const t=i/(n-1);let b=base;if(trend==='rising')b=base-(1-t)*10;else if(trend==='falling')b=base+(1-t)*12;out.push(Math.round(Math.max(15,Math.min(99,b+(r()*spread-spread/2)))));}return out;}

function targetTier(tgt){if(!tgt||tgt==='—')return 1;const t=tgt.toLowerCase();if(t.includes('manager')||t.includes('director')||t.includes('head')||t.includes('vp'))return 3;if(t.includes('lead')||t.includes('analyst')||t.includes('trainer')||t.includes('specialist')||t.includes('consultant')||t.includes('planner'))return 2;return 1;}
function wfChain(e){return WF_TEMPLATES[targetTier(e.tgt)];}

  const _sd=a=>{const m=a.reduce((x,y)=>x+y,0)/a.length;return Math.sqrt(a.reduce((x,y)=>x+(y-m)*(y-m),0)/a.length);};
  const _slope=a=>{const n=a.length,mx=(n-1)/2,my=a.reduce((x,y)=>x+y,0)/n;let nu=0,de=0;a.forEach((y,i)=>{nu+=(i-mx)*(y-my);de+=(i-mx)*(i-mx);});return de?nu/de:0;};
  // ── Trajectory: computed least-squares slope of the quality series (replaces the seeded label) ──
  const trSlope=q>0?_slope(wf.quality):0;
  const trend=q===0?'flat':trSlope>=1.5?'rising':trSlope<=-1.5?'falling':'flat';
  // ── Consistency (Umbrella 1) ──
  const consistency=q>0?Math.max(0,Math.round(100-_sd(wf.quality)*5)):0;
  // ── Umbrella scores: live scored, projected null (this is the real per-umbrella data) ──
  const tenureScore=Math.min(100,Math.round(tenure/12*100));
  const umb=q>0?{quality:q,behavior:Math.round(Math.max(20,Math.min(98,q-3+r()*10))),coaching:Math.round(Math.max(20,Math.min(98,q-5+r()*14))),learning:Math.round(40+r()*55),tenure:tenureScore,satisfaction:null,efficiency:null,reliability:null}
    :{quality:null,behavior:null,coaching:null,learning:null,tenure:tenureScore,satisfaction:null,efficiency:null,reliability:null};
  const learnProg=umb.learning!=null?umb.learning:Math.round(r()*30);
  // ── Readiness = weighted composite of present live umbrellas (two-level, renormalized) ──
  const UW={quality:22,behavior:18,coaching:14,learning:8,tenure:4};const enabledW=66;
  let _ws=0,_vs=0;Object.keys(UW).forEach(k=>{if(typeof umb[k]==='number'){_ws+=UW[k];_vs+=UW[k]*umb[k];}});
  const readiness=(typeof umb.quality==='number'&&_ws)?Math.round(_vs/_ws):0; // Quality is the required umbrella — no Quality → no readiness
  // ── Evidence completeness = coverage × depth ──
  const presentW=Object.keys(UW).reduce((a,k)=>a+(typeof umb[k]==='number'?UW[k]:0),0);
  const coverage=presentW/enabledW;const depth=Math.min(1,evals/5);
  // ── Recency / staleness — stale evidence is DISCOUNTED, not hard-failed ──
  const daysSinceEval=q>0?Math.round(r()*100):999;const stale=daysSinceEval>90;
  const evidence=Math.round(100*coverage*depth*(stale?0.5:1));
  // ── Decision: thresholds + evidence floor + compliance gate ──
  let decision;
  if(q===0||evidence<20)decision='INSUFFICIENT DATA';
  else if(COMPLIANCE.has(id))decision='NOT YET';
  else if(readiness>=85&&evidence>=60)decision='READY';
  else if(readiness>=70)decision='DEVELOPING';
  else decision='NOT YET';
  // ── Confidence: points (count + recency + consistency + coverage) ──
  let conf=15;
  if(q>0){conf=(evals>=5?30:evals>=2?15:5)+(daysSinceEval<=30?20:daysSinceEval<=60?10:0)+(consistency>80?15:0)+Math.round(coverage*35);conf=Math.min(100,conf);}
  // ── Other signals (mock proxies for talent / other screens) ──
  const leadership=q>0?Math.round(Math.max(20,Math.min(98,q-6+r()*16+(trend==='rising'?4:0)))):0;
  const careerFit=q>0?Math.round(Math.max(25,Math.min(97,q-3+r()*12))):0;
  const potential=q>0?Math.round(Math.max(20,Math.min(98,(readiness*0.5+leadership*0.3+(trend==='rising'?18:trend==='falling'?-6:6))+r()*10))):0;
  const comps=COMP_DIMS.map((d,i)=>{let off=r()*24-12;if(i===2)off-=6;if(i===5)off-=3;if(i===6)off-=4;if(i===7)off-=8;return q>0?Math.round(Math.max(20,Math.min(98,q+off))):0;});
  const attrition=HIGHRISK.has(id)?'High':(trend==='falling'?'Medium':(r()>0.7?'Medium':'Low'));
  const certs=q>0?['Product Fundamentals','De-escalation'].concat(readiness>=82?['Leadership Essentials']:[]).concat(r()>0.6?['Compliance 2026']:[]):[];

  // ── Eligibility: an axis INDEPENDENT of readiness (Ch 8.6) — policy prerequisites ──

  // ── Succession readiness category (Ch 10.5) ──
  let successionCat='—';
  if(q>0){if(decision==='READY'&&eligible)successionCat='Ready Now';
    else if(readiness>=80&&trend==='rising')successionCat='Ready in 6 Months';
    else if(readiness>=70)successionCat='Ready in 12 Months';
    else if(readiness>=55)successionCat='Long-Term Potential';
    else successionCat='Emerging Talent';}
  // ── Approval workflow stage (Ch 5 / 9.11): only READY candidates enter the chain ──
  const _chain=WF_TEMPLATES[targetTier(tgt)];const wfStage=decision==='READY'?(id%(_chain.length-1)):-1; // -1 = not in workflow; else an index into the target's approval chain (action stages only)
  return {id,name,initials,cur,tgt,bu,site:SITE[site],siteKey:site,mgr:MGR[mgr],mgrKey:mgr,q,trend,tenure,evals,
    readiness,decision,umb,evidence,consistency,daysSinceEval,stale,leadership,careerFit,potential,comps,conf,attrition,learnProg,certs,wf,managerRec,status,skillGaps,
    eligible,eligReasons,aspiration,managerNotes,successionCat,wfStage,wfHistory:[],
    compliance:COMPLIANCE.has(id),coachingImpact:q>0?Math.round((r()*10-2)*10)/10:null};
});

function radar(vals){const cx=130,cy=108,R=80,n=vals.length;let axes='',poly='',labels='';
  for(let i=0;i<n;i++){const a=-Math.PI/2+i*2*Math.PI/n;const x=cx+R*Math.cos(a),y=cy+R*Math.sin(a);
    axes+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
    const lx=cx+(R+16)*Math.cos(a),ly=cy+(R+16)*Math.sin(a);const anc=Math.abs(Math.cos(a))<.3?'middle':(Math.cos(a)>0?'start':'end');
    labels+=`<text x="${lx}" y="${ly+3}" font-size="9" fill="var(--ink-2)" text-anchor="${anc}">${COMP_DIMS[i].split(' ')[0]}</text>`;
    const rr=R*(vals[i]/100);const px=cx+rr*Math.cos(a),py=cy+rr*Math.sin(a);poly+=`${px},${py} `;}
  let rings='';for(const f of [.33,.66,1]){let p='';for(let i=0;i<n;i++){const a=-Math.PI/2+i*2*Math.PI/n;p+=`${cx+R*f*Math.cos(a)},${cy+R*f*Math.sin(a)} `;}rings+=`<polygon points="${p}" fill="none" stroke="var(--border)" stroke-width="1"/>`;}
  return`<svg viewBox="0 0 260 216" width="240">${rings}${axes}<polygon points="${poly}" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="2"/>${labels}</svg>`;}
function lineChart(seriesArr,labels,colors){const W=340,H=140,pad=24;const all=seriesArr.flat();const mn=Math.min(...all)-4,mx=Math.max(...all)+4;
  const n=seriesArr[0].length;const sx=i=>pad+i*(W-pad*2)/(n-1);const sy=v=>H-pad-(v-mn)/(mx-mn)*(H-pad*2);
  let grid='';for(let g=0;g<=3;g++){const y=pad+g*(H-pad*2)/3;grid+=`<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;}
  let lines='';seriesArr.forEach((s,si)=>{let p='';s.forEach((v,i)=>p+=`${i?'L':'M'}${sx(i)},${sy(v)} `);lines+=`<path d="${p}" fill="none" stroke="${colors[si]}" stroke-width="2.2" stroke-linejoin="round"/>`;lines+=`<circle cx="${sx(n-1)}" cy="${sy(s[n-1])}" r="3.4" fill="${colors[si]}"/>`;});
  let leg='';labels.forEach((l,i)=>leg+=`<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-2)"><span style="width:10px;height:3px;border-radius:2px;background:${colors[i]}"></span>${l}</span>`);
  return`<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px">${grid}${lines}</svg><div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:6px">${leg}</div>`;}
function spark(s,c){const W=100,H=28;const mn=Math.min(...s),mx=Math.max(...s);const sx=i=>i*W/(s.length-1);const sy=v=>H-2-(v-mn)/((mx-mn)||1)*(H-6);let p='';s.forEach((v,i)=>p+=`${i?'L':'M'}${sx(i)},${sy(v)} `);return`<svg viewBox="0 0 ${W} ${H}" width="100" height="28" preserveAspectRatio="none"><path d="${p}" fill="none" stroke="${c||'var(--accent)'}" stroke-width="2"/></svg>`;}

function openWfModal(id,action){

    delay:['Delay decision','Put '+e.name+' on hold. Add a reason for the record.','Reason','Delay'],
    provide:['Provide evidence',(e.evidenceReq?'Requested: “'+e.evidenceReq.what+'”. ':'')+'Attach or describe the evidence for '+e.name+' (adds it to the Evidence Locker).','Describe the evidence / attachment reference','Submit evidence']
  }[action];

function confirmWf(id,action){
  const e=byId(id);if(!e)return;
  const t=document.getElementById('wfReason');const reason=t?t.value.trim():'';
  if(action==='sendback'&&!reason){toast('A reason is required to send back');return;}
  const labels={advance:'Approved & advanced',sendback:'Sent back',evidence:'Requested evidence',delay:'Delayed',provide:'Provided evidence'};
  const chain=wfChain(e);
  const fromStage=chain[e.wfStage];                    // stage the action was taken at
  if(action==='advance'){e.wfStage=Math.min(chain.length-1,e.wfStage+1);if(e.wfStage===chain.length-1){e.status='Approved';e.approvedCycle=CURRENT_CYCLE;}else e.status=chain[e.wfStage];}
  else if(action==='sendback'){e.wfStage=Math.max(0,e.wfStage-1);e.status=chain[e.wfStage];}
  const toStage=chain[e.wfStage];                      // stage it landed at after the move
  const moved=(action==='advance'||action==='sendback');
  e.wfHistory.unshift({when:new Date().toLocaleString(),by:ACTOR[viewRole]||viewRole,role:viewRole,from:fromStage,to:toStage,moved,action:labels[action],reason:reason||'—'});
  // evidence & delay: no stage change — logged only
  if(action==='evidence')e.evidenceReq={by:ACTOR[viewRole]||viewRole,role:viewRole,what:reason||'Additional evidence',when:new Date().toLocaleString(),status:'pending'};
  if(action==='provide'&&e.evidenceReq){e.evidenceReq.status='provided';e.evidenceReq.providedBy=ACTOR[viewRole]||viewRole;e.evidenceReq.providedNote=reason||'Attached';e.evidenceReq.providedWhen=new Date().toLocaleString();}
  closeModal();toast(e.name+' — '+labels[action]);render();
}
function promoWorkflow(){
  const scopeWord={Supervisor:'team','Operations Manager':'teams & sites',HR:'business unit'}[viewRole]||'scope';
  const inWf=EMP.filter(e=>e.wfStage>=0&&roleScope()(e));
  const approvedAll=inWf.filter(e=>e.wfStage>=wfChain(e).length-1);
  const active=inWf.filter(e=>e.wfStage<wfChain(e).length-1).sort((a,b)=>b.wfStage-a.wfStage);
  const mine=active.filter(e=>STAGE_OWNER_MAP[wfChain(e)[e.wfStage]]===viewRole);
  const others=active.filter(e=>STAGE_OWNER_MAP[wfChain(e)[e.wfStage]]!==viewRole);
  const card=(e,actable)=>`<div class="card" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">${avatar(e)}<div><div style="font-weight:650">${e.name}</div><div class="li-s">${e.cur} → ${e.tgt} · ${e.mgr}</div></div>
      <span style="margin-left:auto;display:flex;gap:6px;align-items:center">${(()=>{if(e.wfStage>=wfChain(e).length-1){const r=openReqFor(e);return `<span class="tag tag-g" title="${r?'Filled from '+r.req:'Role filled'}">Role filled</span>`;}const r=openReqFor(e);return r?`<span class="tag tag-g" title="${r.count} opening(s) · ${r.site}">Open role: ${r.role} · ${r.req}</span>`:`<span class="tag tag-r" title="No open requisition for ${e.tgt} — blocks final approval">No open role for ${e.tgt}</span>`;})()}${eligPill(e)}</span></div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">
      ${wfChain(e).map((st,i)=>`<div style="flex:1;min-width:90px;text-align:center;padding:8px 6px;border-radius:8px;font-size:11px;font-weight:600;${i<e.wfStage?'background:var(--ready-bg);color:var(--ready)':i===e.wfStage?'background:var(--accent);color:#fff':'background:var(--panel-2);color:var(--ink-3)'}">${i<e.wfStage?'✓ ':''}${st}</div>${i<wfChain(e).length-1?'<span style="align-self:center;color:var(--ink-3)">→</span>':''}`).join('')}
    </div>
    ${e.evidenceReq?`<div class="li-s" style="margin-bottom:10px;padding:8px 10px;border-radius:8px;background:var(--panel-2)">${e.evidenceReq.status==='provided'?`✓ <b>Evidence provided</b> by ${e.evidenceReq.providedBy} — “${e.evidenceReq.providedNote}” · <a href="#" onclick="openEvidence(${e.id});return false" style="color:var(--accent)">view</a>`:`⏳ <b>Evidence requested</b> by ${e.evidenceReq.by} (${e.evidenceReq.role}) — “${e.evidenceReq.what}” · awaiting ${e.mgr}`}</div>`:''}
    <div class="actbtns">
      ${e.evidenceReq&&e.evidenceReq.status==='pending'&&viewRole==='Supervisor'?`<button class="btn sm" onclick="openWfModal(${e.id},'provide')">Provide evidence</button>`:''}
      ${e.wfStage>=wfChain(e).length-1?`<span class="pill p-ready">Promotion approved</span>${e.approvedCycle?` <span class="tag tag-g">${e.approvedCycle}</span>`:''}`
        :actable?`<button class="btn sm" onclick="openWfModal(${e.id},'advance')">Approve &amp; advance</button>${e.wfStage>0?`<button class="btn sm ghost" onclick="openWfModal(${e.id},'sendback')">Send back</button>`:''}${STAGE_OWNER_MAP[wfChain(e)[e.wfStage]]!=='Supervisor'?`<button class="btn sm ghost" onclick="openWfModal(${e.id},'evidence')">Request evidence</button>`:''}<button class="btn sm ghost" onclick="openWfModal(${e.id},'delay')">Delay</button>`
        :`<span class="li-s">Awaiting <b>${STAGE_OWNER_MAP[wfChain(e)[e.wfStage]]}</b> (${wfChain(e)[e.wfStage]})</span>`}
      <button class="btn sm ghost" onclick="openEvidence(${e.id})">View evidence</button>
      <button class="btn sm ghost" onclick="openEmp(${e.id})">Open profile</button>
    </div>
    ${e.wfHistory&&e.wfHistory.length?`<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px"><div class="li-s" style="font-weight:600;margin-bottom:6px">Audit trail</div>${e.wfHistory.map(h=>`<div class="li-s" style="margin-bottom:4px">${h.when} · <b>${h.by}</b> (${h.role}) · ${h.action}${h.moved!==undefined?(h.moved?` (${h.from} → ${h.to})`:` at ${h.from}`):` at ${h.stage}`}${h.reason&&h.reason!=='—'?` — “${h.reason}”`:''}</div>`).join('')}</div>`:''}
    </div>`;
  const wfSub=`<div class="subtabs"><div class="subtab ${wfView==='active'?'on':''}" onclick="wfView='active';render()">Active <span class="tag">${active.length}</span></div><div class="subtab ${wfView==='approved'?'on':''}" onclick="wfView='approved';render()">Approved <span class="tag tag-g">${approvedAll.length}</span></div></div>`;
  if(wfView==='approved'){
    const list=approvedAll.filter(e=>!wfCycle||e.approvedCycle===wfCycle);
    const cycOpts=CYCLES.filter(c=>approvedAll.some(e=>e.approvedCycle===c));
    return wfSub+`<div class="filters" style="margin-top:12px"><select onchange="wfCycle=this.value;render()"><option value="">All cycles</option>${cycOpts.map(c=>`<option ${wfCycle===c?'selected':''}>${c}</option>`).join('')}</select><span class="li-s" style="align-self:center">${list.length} approved in your ${scopeWord}</span></div>
    ${list.map(e=>card(e,false)).join('')||`<div class="card"><p class="note">No approved promotions${wfCycle?' in '+wfCycle:''} in your ${scopeWord}.</p></div>`}`;
  }
  return wfSub+`<p class="note" style="margin-top:12px">Human-in-the-loop chain — each stage is owned by a role and gated by eligibility and business need; every action is auditable and captures a reason (mock state).</p>
  <h3 style="margin:4px 0 10px">Awaiting your action <span class="tag">${mine.length}</span></h3>
  ${mine.map(e=>card(e,true)).join('')||'<div class="card"><p class="note">Nothing is awaiting your action right now.</p></div>'}
  <h3 style="margin:20px 0 10px">In progress in your ${scopeWord} <span class="tag">${others.length}</span></h3>
  ${others.map(e=>card(e,false)).join('')||'<div class="card"><p class="note">No other cases in your scope.</p></div>'}`;
}
// ── Consistency Review — read-only anomaly tracker (future scope) ──
function promoConsistency(){
  const scopeWord={Supervisor:'team','Operations Manager':'teams & sites',HR:'business unit'}[viewRole]||'scope';
  const pool=EMP.filter(e=>e.readiness>0&&roleScope()(e)&&e.tgt!=='—');
  const roles=[...new Set(pool.map(e=>e.tgt))].sort();
  if(!calCohort||!roles.includes(calCohort))calCohort=roles[0]||'';
  const cands=pool.filter(e=>e.tgt===calCohort).sort((a,b)=>b.readiness-a.readiness);
  const rec=e=>e.managerRec==='Recommend';
  const flag=e=>rec(e)&&e.readiness<calBar?{t:'Below bar · recommended',c:'tag-r'}:(!rec(e)&&e.readiness>=calBar?{t:'Above bar · not recommended',c:'tag-a'}:null);
  const flags=cands.filter(flag).length;
  const byMgr={};cands.forEach(e=>{(byMgr[e.mgr]=byMgr[e.mgr]||[]).push(e);});
  const cohortSel=`<select onchange="calCohort=this.value;render()">${roles.map(r=>`<option ${r===calCohort?'selected':''}>${r}</option>`).join('')}</select>`;
  const barCtl=`<label class="li-s" style="align-self:center">Cohort bar <input type="number" min="0" max="100" value="${calBar}" onchange="calBar=+this.value||85;render()" style="width:60px;margin-left:6px;padding:6px 8px;border:1px solid var(--border);border-radius:8px;background:var(--panel-2);color:var(--ink)"></label>`;
  const block=(m,list)=>{const recd=list.filter(rec);const lenAvg=recd.length?Math.round(recd.reduce((a,e)=>a+e.readiness,0)/recd.length):null;const lbl=lenAvg===null?'':lenAvg<calBar-3?' · lenient':lenAvg>calBar+5?' · strict':' · aligned';
    return `<div class="card" style="margin-bottom:14px"><h3>${m} <span class="tag">${list.length}</span> <span class="li-s" style="font-weight:400">· recommends at avg ${lenAvg!==null?lenAvg+'%':'—'}${lbl}</span></h3>
    <div class="tw" style="box-shadow:none;margin:6px 0 0"><table><thead><tr><th>Candidate</th><th>Readiness</th><th>Confidence</th><th>Eligibility</th><th>Supervisor Rec</th><th>Flag</th></tr></thead><tbody>
    ${list.map(e=>{const f=flag(e);return `<tr class="clk" onclick="openEmp(${e.id})"><td>${empCell(e)}</td><td class="num" style="min-width:100px">${scoreCell(e.readiness)}</td><td class="num">${e.conf}%</td><td>${eligPill(e)}</td><td style="font-size:12px">${e.managerRec}</td><td>${f?`<span class="tag ${f.c}">${f.t}</span>`:'<span class="li-s">—</span>'}</td></tr>`;}).join('')}
    </tbody></table></div></div>`;};
  return `<div class="card" style="border:1px dashed var(--accent);margin-bottom:16px">
    <h3 style="display:flex;align-items:center;gap:8px;margin-top:0">🔭 Future scope — Consistency Review <span class="tag tag-a">Anomaly Tracker</span></h3>
    <div class="grid g2" style="margin-top:8px">
      <div><b style="font-size:12px">What it is</b><p class="li-s" style="margin:4px 0 0">A read-only tracker that flags where a supervisor's promotion recommendation <b>diverges from the objective Readiness</b> score, within a like-for-like cohort (same target role) — an early <b>rater-bias</b> signal. It does not rank agents or make decisions.</p></div>
      <div><b style="font-size:12px">Why we need it</b><p class="li-s" style="margin:4px 0 0">Supervisors apply different bars, so one manager's "ready" isn't another's. Left unchecked that is unfair and hard to defend. This keeps promotions <b>consistent, fair and auditable</b> across teams.</p></div>
      <div><b style="font-size:12px">How the panel uses it</b><p class="li-s" style="margin:4px 0 0">Each cycle the panel (Operations Manager + HR + supervisors) reviews the flagged mismatches and each supervisor's recommendation bar, discusses the outliers (<b>over-recommended</b> vs <b>missed talent</b>), and agrees the bar. Selection then happens in <b>Compare Candidates</b> and sign-off in the <b>Approval Workflow</b> — this screen is the diagnostic, not the decision.</p></div>
      <div><b style="font-size:12px">Roadmap</b><p class="li-s" style="margin:4px 0 0">Trend across cycles · forced-distribution &amp; extreme-usage detection · demographic fairness checks (V3) · a link into the full <b>Bias &amp; Fairness</b> analytics.</p></div>
    </div>
    <p class="li-s" style="margin:10px 0 0;color:var(--ink-3)">Preview of the tracker below (mock).</p>
  </div>
  <div class="filters">${cohortSel}${barCtl}<span class="li-s" style="align-self:center">${cands.length} candidates · <b>${flags}</b> flagged · in your ${scopeWord}</span></div>
  ${Object.keys(byMgr).length?Object.entries(byMgr).map(([m,list])=>block(m,list)).join(''):`<div class="card"><p class="note">No candidates for this cohort in your ${scopeWord}.</p></div>`}
  `;
}
function promoQueue(){
  const cols=[['READY','Ready to Approve'],['DEVELOPING','In Development'],['NOT YET','Not Yet Ready'],['INSUFFICIENT DATA','Insufficient Data']];
  return `<div class="grid g4" style="align-items:start">
  ${cols.map(([d,l])=>{const g=EMP.filter(e=>e.decision===d).sort((a,b)=>b.readiness-a.readiness);
    return `<div class="card"><h3>${l} <span class="r"><span class="tag">${g.length}</span></span></h3>
      ${g.map(e=>`<div class="list-item clk" style="cursor:pointer" onclick="openEmp(${e.id})">${avatar(e,'av')}<div><div class="li-t">${e.name}</div><div class="li-s">${e.readiness>0?e.readiness+'% · '+e.tgt:e.cur}</div></div>${e.attrition==='High'?'<span class="li-meta"><span class="tag tag-r">flight risk</span></span>':''}</div>`).join('')||'<p class="note">None</p>'}
    </div>`;}).join('')}</div>`;
}
function cmpVerdict(e){
  const live=[['Quality',e.umb.quality],['Conversation & Behavior',e.umb.behavior],['Coaching',e.umb.coaching],['Learning',e.umb.learning]].filter(x=>typeof x[1]==='number');
  const sorted=[...live].sort((a,b)=>b[1]-a[1]);
  const strengths=sorted.slice(0,2).map(x=>x[0]+' '+x[1]+'%').join(', ');
  const weakest=sorted[sorted.length-1];
  const decTxt={'READY':'promotion-ready','DEVELOPING':'developing','NOT YET':'not yet ready','INSUFFICIENT DATA':'insufficient data'}[e.decision]||e.decision;
  let sugg;
  if(e.compliance)sugg='⛔ <b>Blocked</b> — an open compliance flag must be cleared before any promotion.';
  else if(!e.eligible)sugg='⏳ <b>Ready on evidence but ineligible</b> ('+e.eligReasons.join('; ')+') — resolve the prerequisite, then proceed.';
  else if(e.decision==='READY')sugg='✅ <b>Recommend</b> — send to the approval workflow'+(e.attrition==='High'?'; <b>prioritise</b>, high flight-risk.':'.');
  else if(e.decision==='DEVELOPING')sugg='📈 <b>Develop</b> '+(weakest?weakest[0]:'the weakest area')+', then re-review next cycle.';
  else if(e.decision==='INSUFFICIENT DATA')sugg='📋 <b>Gather evidence</b> — too few evaluations to judge yet.';
  else sugg='⏸ <b>Hold</b> — below the readiness bar this cycle.';
  return `<p style="margin:0 0 6px">${e.name} is <b>${decTxt}</b> for <b>${e.tgt}</b> at <b>${e.readiness}%</b> (confidence ${e.conf}% · ${fmtTrend(e.trend)}).</p>
  <p class="li-s" style="margin:0 0 4px"><b>Strengths:</b> ${strengths||'—'}.</p>
  ${weakest?`<p class="li-s" style="margin:0 0 6px"><b>Watch:</b> ${weakest[0]} ${weakest[1]}%${e.trend==='falling'?' · trajectory declining':''}.</p>`:''}
  <p style="margin:6px 0 0"><b>Suggestion:</b> ${sugg}</p>`;
}
function promoCompare(){
  const scopeWord={Supervisor:'team','Operations Manager':'teams & sites',HR:'business unit'}[viewRole]||'scope';
  const inScope=EMP.filter(e=>roleScope()(e));
  const modeTabs=`<div class="subtabs">${[['position','By position'],['custom','Custom selection']].map(([k,l])=>`<div class="subtab ${cmpMode===k?'on':''}" onclick="cmpMode='${k}';render()">${l}</div>`).join('')}</div>`;
  let cands=[],controls='',empty='';
  if(cmpMode==='position'){
    const roles=[...new Set(inScope.filter(e=>e.decision==='READY'&&e.tgt&&e.tgt!=='—').map(e=>e.tgt))].sort();
    if(!cmpRole||!roles.includes(cmpRole))cmpRole=roles[0]||'';
    cands=inScope.filter(e=>e.decision==='READY'&&e.tgt===cmpRole).sort((a,b)=>b.readiness-a.readiness);
    controls=`<div class="filters"><select onchange="cmpRole=this.value;render()">${roles.length?roles.map(r=>`<option ${r===cmpRole?'selected':''}>${r}</option>`).join(''):'<option>—</option>'}</select><span class="li-s" style="align-self:center">${cands.length} READY candidate(s) for ${cmpRole||'—'} · in your ${scopeWord}</span></div>`;
    empty='No READY candidates for this position in your '+scopeWord+'.';
  }else{
    cands=cmpList.map(id=>byId(id)).filter(Boolean);
    const addable=inScope.filter(e=>!cmpList.includes(e.id)).sort((a,b)=>a.name.localeCompare(b.name));
    controls=`<div class="filters"><select onchange="if(this.value){cmpList.push(+this.value);render();}"><option value="">+ Add agent…</option>${addable.map(e=>`<option value="${e.id}">${e.name} (${e.decision})</option>`).join('')}</select>${cmpList.length?`<button class="btn sm ghost" onclick="cmpList=[];render()">Clear</button>`:''}<span class="li-s" style="align-self:center">${cands.length} selected · pick any agents to compare</span></div>`;
    empty='Add agents from the dropdown to compare.';
  }
  const body=cands.length?(()=>{
    const two=cands.length===2;const colspan=2+cands.length; // Dimension + candidates + Advantage
    const sticky='position:sticky;right:0;background:var(--panel);border-left:1px solid var(--border);text-align:center';
    const adv=(vf,numeric)=>{
      if(!numeric)return '—';
      const nums=cands.map(vf).filter(v=>typeof v==='number');if(!nums.length)return '—';
      const mx=Math.max(...nums);const leaders=cands.filter(e=>vf(e)===mx);
      if(leaders.length===cands.length||leaders.length>1)return 'Tie';
      const w=leaders[0];
      if(two){const[a,b]=cands;return w.id===a.id?'← '+a.name:b.name+' →';}
      return '→ '+w.name.split(' ')[0];
    };
    // decision metrics
    const dRows=[{l:'Readiness',v:e=>e.readiness,f:v=>v+'%',n:true},{l:'Decision',v:e=>e.decision,f:v=>pill(v),n:false},{l:'Confidence',v:e=>e.conf,f:v=>v+'%',n:true},{l:'Trajectory',v:e=>e.trend,f:v=>fmtTrend(v),n:false},{l:'Eligibility',v:e=>e.eligible,f:(v,e)=>eligPill(e),n:false},{l:'Tenure (months)',v:e=>e.tenure,f:v=>v,n:false},{l:'Career Fit',v:e=>'',f:()=>'<span class="li-s" title="Configure role profiles to enable">— · set up</span>',n:false},{l:'Target Role',v:e=>e.tgt,f:v=>v,n:false},{l:'Supervisor',v:e=>e.mgr,f:v=>v,n:false},{l:'Supervisor Rec',v:e=>e.managerRec,f:v=>v,n:false}];
    const dRow=row=>{let mx=null;if(row.n&&cands.length>1)mx=Math.max(...cands.map(e=>{const v=row.v(e);return typeof v==='number'?v:-Infinity;}));return `<tr><td>${row.l}</td>${cands.map(e=>{const v=row.v(e);const best=row.n&&mx!==null&&v===mx;return `<td class="num" style="text-align:center;${best?'color:var(--ready);font-weight:700':''}">${row.f(v,e)}</td>`;}).join('')}<td style="${sticky};font-weight:600">${adv(row.v,row.n)}</td></tr>`;};
    // readiness breakdown (umbrellas) — live scored, projected greyed
    const uRows=[{l:'Quality (Evaluation) · U1',v:e=>e.umb.quality,live:1},{l:'Conversation & Behavior · U2',v:e=>e.umb.behavior,live:1},{l:'Coaching & Growth · U3',v:e=>e.umb.coaching,live:1},{l:'Learning & Skill · U4',v:e=>e.umb.learning,live:1},{l:'Tenure · U5',v:e=>e.umb.tenure,live:1},{l:'Surveyed Satisfaction · U7',live:0},{l:'Handling Efficiency · U8',live:0},{l:'Schedule Reliability · U9',live:0}];
    const uRow=row=>{
      if(!row.live)return `<tr><td>${row.l} <span class="src src-mock">projected</span></td>${cands.map(()=>'<td style="text-align:center"><span class="li-s">connect to enable</span></td>').join('')}<td style="${sticky}">—</td></tr>`;
      const vals=cands.map(row.v).filter(v=>typeof v==='number');const mx=vals.length?Math.max(...vals):null;
      return `<tr><td>${row.l}</td>${cands.map(e=>{const v=row.v(e);if(typeof v!=='number')return '<td style="text-align:center"><span class="li-s">—</span></td>';const best=cands.length>1&&v===mx;return `<td class="num" style="text-align:center;${best?'color:var(--ready);font-weight:700':''}">${v}%</td>`;}).join('')}<td style="${sticky};font-weight:600">${adv(row.v,true)}</td></tr>`;
    };
    const headTh=cands.map(e=>`<th style="text-align:center;min-width:160px"><div style="font-weight:700">${e.name}</div><div class="li-s" style="font-weight:400">${e.cur} · ${e.mgr}</div><div style="margin-top:5px;display:flex;gap:10px;justify-content:center"><a href="#" onclick="openEvidence(${e.id});return false" style="color:var(--accent);font-size:11px">View evidence</a>${cmpMode==='custom'?`<a href="#" onclick="cmpList=cmpList.filter(x=>x!==${e.id});render();return false" style="color:var(--ink-3);font-size:11px">Remove</a>`:''}</div></th>`).join('');
    const table=`<div class="tw" style="margin-top:16px"><table><thead><tr><th>Dimension</th>${headTh}<th style="${sticky}">Advantage</th></tr></thead><tbody>
      ${dRows.map(dRow).join('')}
      <tr><td colspan="${colspan}" style="background:var(--panel-2);font-weight:600;font-size:12px">Readiness breakdown (umbrellas) — live scored · projected greyed; best value highlighted</td></tr>
      ${uRows.map(uRow).join('')}
    </tbody></table></div>`;
    const verdicts=`<div class="grid" style="grid-template-columns:repeat(${Math.min(cands.length,3)},1fr);margin-top:16px">${cands.map(e=>`<div class="card"><div class="ai"><h4>🤖 ${e.name} — recommendation</h4>${cmpVerdict(e)}</div></div>`).join('')}</div>`;
    return table+verdicts;
  })():`<div class="card"><p class="note">${empty}</p></div>`;
  return `<p class="note" style="margin-top:0"><b>Compare candidates side by side.</b> <b>By position</b> auto-loads all <b>READY</b> candidates for a target role (across supervisors); <b>Custom selection</b> lets you add any agents you choose. Component scores that already roll into Readiness (Quality, Behavioral, etc.) are omitted; Confidence is shown so thin data isn't over-read.</p>
  ${modeTabs}${controls}${body}`;
}
function verdict(e){
  if(e.decision==='READY')return `${e.name} is promotion-ready for ${e.tgt} (${e.readiness}%). Strengths: ${e.skillGaps.length?COMP_DIMS.filter((d,i)=>e.comps[i]>=80).slice(0,2).join(', ')||'consistent quality':''}. Confidence ${e.conf}%.${e.attrition==='High'?' ⚠ High flight risk — act soon.':''}`;
  if(e.decision==='DEVELOPING')return `${e.name} is developing (${e.readiness}%). Focus areas: ${e.skillGaps.map(g=>g.d).join(', ')}.`;
  if(e.decision==='NOT YET')return `${e.name} is not yet ready.${e.compliance?' Open compliance flag is a hard block.':' Below the readiness threshold.'}`;
  return `Insufficient data to assess ${e.name} — needs more evaluations.`;
}
function promoPacket(){
  const e=selEmp;
  const uW={'Quality (Evaluation) · U1':22,'Conversation & Behavior · U2':18,'Coaching & Growth · U3':14,'Learning & Skill · U4':8,'Tenure · U5':4};
  const uLive=[['Quality (Evaluation) · U1',e.umb.quality],['Conversation & Behavior · U2',e.umb.behavior],['Coaching & Growth · U3',e.umb.coaching],['Learning & Skill · U4',e.umb.learning],['Tenure · U5',e.umb.tenure]];
  const uProj=['Surveyed Satisfaction · U7','Handling Efficiency · U8','Schedule Reliability · U9'];
  const breakdown=`<h3 style="margin-top:14px">Readiness breakdown (umbrellas) ${SRC.live}</h3>
   <div class="tw" style="box-shadow:none"><table><thead><tr><th>Umbrella</th><th style="text-align:center">Score</th><th style="text-align:center">Weight</th></tr></thead><tbody>
   ${uLive.map(([l,v])=>`<tr><td>${l}</td><td class="num" style="text-align:center">${typeof v==='number'?v+'%':'—'}</td><td class="num" style="text-align:center">${uW[l]}</td></tr>`).join('')}
   ${uProj.map(l=>`<tr><td>${l} <span class="src src-mock">projected</span></td><td style="text-align:center"><span class="li-s">connect to enable</span></td><td class="num" style="text-align:center">—</td></tr>`).join('')}
   </tbody></table></div>
   <p class="li-s" style="margin-top:6px">Readiness = weighted average of the live umbrellas above = <b>${e.readiness}%</b> · evidence completeness <b>${e.evidence}%</b> · confidence <b>${e.conf}%</b>.</p>`;
  const numL=uLive.filter(x=>typeof x[1]==='number');
  const strengths=[...numL].sort((a,b)=>b[1]-a[1]).slice(0,2).map(x=>x[0].split(' · ')[0]).join(', ');
  const weakest=[...numL].sort((a,b)=>a[1]-b[1])[0];
  const risks=[];
  if(e.compliance)risks.push('Open compliance flag — must be cleared (hard block).');
  if(!e.eligible)risks.push('Ineligible: '+e.eligReasons.join('; ')+'.');
  if(e.trend==='falling')risks.push('Trajectory declining — confirm recent performance.');
  if(e.conf<60)risks.push('Low confidence ('+e.conf+'%) — thin or ageing evidence; gather more before deciding.');
  if(e.attrition==='High')risks.push('High flight-risk — prioritise or plan retention.');
  if(weakest&&weakest[1]<70)risks.push('Development area: '+weakest[0].split(' · ')[0]+' ('+weakest[1]+'%).');
  const reason=e.decision==='READY'
    ?`Meets the bar for <b>${e.tgt}</b> at ${e.readiness}% (evidence ${e.evidence}%). Strengths: ${strengths||'—'}. ${bizNeed(e)?'An open requisition exists ('+(openReqFor(e)?openReqFor(e).req:'')+').':'No open requisition yet — a business need is required before promotion.'}`
    :`Not put forward this cycle — ${e.decision==='DEVELOPING'?'developing toward the bar':e.decision==='INSUFFICIENT DATA'?'insufficient evaluation evidence to assess':'below the readiness bar'}.`;
  const bizCase=`<h3 style="margin-top:14px">Business case</h3>
   <div class="evi"><span><b style="font-weight:600">Reason to promote</b></span></div>
   <p class="li-s" style="margin:2px 0 10px">${reason}</p>
   <div class="evi"><span><b style="font-weight:600">Risks &amp; mitigations</b> ${SRC.cfg}</span></div>
   ${risks.length?`<ul class="li-s" style="margin:4px 0 0;padding-left:18px">${risks.map(r=>`<li>${r}</li>`).join('')}</ul>`:'<p class="li-s" style="margin:2px 0 0">None flagged.</p>'}`;
  return `<div class="actbtns" style="margin-bottom:14px"><button class="btn" onclick="window.print()">🖨 Print / Save PDF</button><button class="btn ghost" onclick="openExport()">Export…</button><select class="role-sel" onchange="selEmp=byId(+this.value);render()" style="margin-left:auto">${EMP.filter(x=>x.readiness>0).map(x=>`<option value="${x.id}" ${x.id===e.id?'selected':''}>${x.name}</option>`).join('')}</select></div>
  <div class="card">
    <div style="display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:14px">
      <div class="avatar" style="width:52px;height:52px;font-size:18px">${e.initials}</div>
      <div><div style="font-size:20px;font-weight:750">${e.name}</div><div class="li-s">${e.cur} → <b>${e.tgt}</b> · ${e.bu} · ${e.site} · Supervisor: ${e.mgr}</div></div>
      <div style="margin-left:auto;text-align:center">${donut(e.readiness)}<div style="margin-top:6px">${pill(e.decision)}</div></div>
    </div>
    <div class="grid g3">
      ${[['Readiness',e.readiness],['Confidence',e.conf],['Evidence',e.evidence]].map(([l,v])=>`<div class="card kpi" style="text-align:center"><div class="v" style="font-size:22px;color:${clr(v)}">${v}%</div><div class="l">${l}</div></div>`).join('')}
    </div>
    <div class="evi"><span><b style="font-weight:600">Eligibility</b> ${SRC.cfg}</span><span>${eligPill(e)}${e.eligReasons.length?` <span class="li-s">(${e.eligReasons.join(', ')})</span>`:''}</span></div>
    <div class="evi"><span><b style="font-weight:600">Career Fit</b> ${SRC.cfg}</span><span class="li-s">— · set up</span></div>
    <div class="evi"><span><b style="font-weight:600">Approval status</b></span><span>${e.wfStage>=0?`<span class="tag tag-a">${wfChain(e)[e.wfStage]}</span>`:'<span class="tag">Not submitted</span>'}</span></div>
    <div class="ai" style="margin:14px 0"><h4>🤖 AI Recommendation &amp; Justification</h4>${cmpVerdict(e)}</div>
    ${breakdown}
    <h3 style="margin-top:14px">Supporting Evidence ${SRC.live}</h3>
    <div class="evi"><span>Quality Evaluations</span><b>${e.evals} on record · avg ${e.q}%</b></div>
    <div class="evi"><span>Coaching Impact (pre→post)</span><b style="color:${e.coachingImpact>=0?'var(--ready)':'var(--not)'}">${e.coachingImpact>0?'+':''}${e.coachingImpact} pts</b></div>
    <div class="evi"><span>Trajectory</span><b>${fmtTrend(e.trend)}</b></div>
    <div class="evi"><span>Consistency (quality steadiness)</span><b>${e.consistency}%</b></div>
    <div class="evi"><span>Tenure</span><b>${e.tenure} months</b></div>
    <div class="evi"><span>Certifications ${SRC.lms}</span><b>${e.certs.length}</b></div>
    ${bizCase}
  </div>`;
}

// assistant
let chat=[];
function openAssist(){document.getElementById('overlay').classList.add('show');document.getElementById('slideover').classList.add('show');if(!chat.length)renderChat(true);}

function sugHTML(){return `<div class="so-sug">
    <button onclick="ask('Why isn\\'t Marcus Johnson promotion-ready?')">Why isn't Marcus Johnson promotion-ready?</button>
    <button onclick="ask('Who is ready for Team Lead?')">Who is ready for Team Lead?</button>

  </div>`;}
function renderChat(withSug){const b=document.getElementById('soBody');
  b.innerHTML=chat.map(m=>`<div class="msg ${m.r}">${m.t}</div>`).join('');
  if(withSug){b.innerHTML+=`<div class="msg a">Hi Rachel 👋 I can explain any promotion decision from the evidence. Try:</div>`+sugHTML();}
  b.scrollTop=b.scrollHeight;}
function ask(q){document.getElementById('soInput').value=q;sendAssist();}
const escHtml=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
// ── After every answer: a way to close the panel, or reset back to the starting greeting + suggestions ──
function returnToMain(){chat=[];renderChat(true);}
function actionRow(){return `<div class="so-sug">
    <button onclick="closeAssist()">Close Ask AI</button>
    <button onclick="returnToMain()">Return to main window</button>
  </div>`;}
// ── When the assistant has no real answer, redirect back to the starting screen (same greeting + suggestions) instead of a dead end ──
// ── When it's an unrecognized name, offer a single "Did you mean…?" chip instead — one click re-asks the same question, corrected ──
function sendAssist(){
  const inp=document.getElementById('soInput');const q=inp.value.trim();if(!q)return;
  chat.push({r:'u',t:q});inp.value='';
  let ans=answer(q),redirect=false,corrected=null;
  if(ans.startsWith('__DIDYOUMEAN__')){const[msg,fix]=ans.slice('__DIDYOUMEAN__'.length).split('|||');ans=msg;corrected=fix;}
  else if(ans.startsWith('__REDIRECT__')){redirect=true;ans=ans.slice('__REDIRECT__'.length);}
  chat.push({r:'a',t:ans});
  renderChat(false);
  const b=document.getElementById('soBody');
  if(corrected){b.innerHTML+=`<div class="so-sug"><button onclick="ask('${corrected.replace(/'/g,"\\'")}')">${escHtml(corrected)}</button></div>`;}
  else if(redirect){b.innerHTML+=`<div class="msg a">Here's what I can help with:</div>`+sugHTML();}
  b.innerHTML+=actionRow();
  b.scrollTop=b.scrollHeight;
}
function findEmpInText(q){const lq=q.toLowerCase();return EMP.find(e=>lq.includes(e.name.toLowerCase())||lq.includes(e.name.split(' ')[0].toLowerCase()));}
// ── Fuzzy "did you mean" — catches typos/partial names that exact substring matching misses ──
function levenshtein(a,b){const m=a.length,n=b.length,dp=[Array.from({length:n+1},(_,j)=>j)];for(let i=1;i<=m;i++){dp[i]=[i];for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);}return dp[m][n];}
// Typo-tolerant keyword check — "evidances"/"evidence" should mean the same intent, not silently fall through to the generic answer
function fuzzyIncludes(lq,target,maxScore=0.3){
  if(lq.includes(target))return true;
  return lq.split(/\s+/).some(w=>Math.abs(w.length-target.length)<=3&&levenshtein(w,target)/Math.max(w.length,target.length)<=maxScore);
}
// Case-independent — "michael johnson" (typed lowercase) must guess just as well as "Michael Johnson"
const STOPWORDS=new Set(['why',"who's",'who','what','how','is','are',"isn't",'not','did','does','do','show','compare','the','a','an','for','of','to','and','ready','promotion','promotion-ready','evidence','improve','develop','that','this','about','me','tell']);
function guessName(q){
  const words=q.split(/\s+/).map(w=>w.replace(/[?.!,]+$/,'')).filter(Boolean);
  let bestRun=[],curRun=[];
  words.forEach(w=>{
    if(STOPWORDS.has(w.toLowerCase()))(curRun.length>bestRun.length&&(bestRun=curRun),curRun=[]);
    else curRun.push(w);
  });
  if(curRun.length>bestRun.length)bestRun=curRun;
  return bestRun.length?bestRun.join(' '):null;
}
// Compares against the full name AND each individual name part — a first-name-only guess like "Sara" must be
// judged against "sarah" alone, not penalized for missing the "mitchell" a full-name-only comparison would expect.
function fuzzyFindEmp(nameGuess){
  if(!nameGuess)return null;
  const g=nameGuess.toLowerCase(),gLast=g.split(' ').pop();
  const surnameHit=EMP.find(e=>e.name.split(' ').pop().toLowerCase()===gLast);
  if(surnameHit)return surnameHit;
  let best=null,bestScore=Infinity;
  EMP.forEach(e=>{
    const full=e.name.toLowerCase();
    [full,...full.split(' ')].forEach(c=>{const d=levenshtein(g,c);const score=d/Math.max(g.length,c.length);if(score<bestScore){bestScore=score;best=e;}});
  });
  return bestScore<=0.4?best:null;
}
// ── Every real Target Role from the Promotion Dashboard column (not hardcoded to just Team Lead) ──
const KNOWN_ROLES=[...new Set(EMP.map(e=>e.tgt).filter(t=>t&&t!=='—'))];
function answer(q){const lq=q.toLowerCase();
  if(lq.includes('ready for')){
    const role=KNOWN_ROLES.find(r=>lq.includes(r.toLowerCase()));
    if(role){const r=EMP.filter(e=>e.tgt===role&&e.decision==='READY');return `<b>${r.length}</b> ready for ${role}: ${r.map(e=>e.name+' ('+e.readiness+'%)').join(', ')||'none yet'}.`;}
    const asked=(q.split(/ready for/i)[1]||'').trim().replace(/[?.!]+$/,'')||'that role';
    return `__REDIRECT__We don't have an open role for "${asked}". Roles I can check today: ${KNOWN_ROLES.join(', ')}.`;
  }
  if(lq.includes('compare')){const names=EMP.filter(e=>lq.includes(e.name.split(' ')[0].toLowerCase()));if(names.length>=2){const[a,b]=names;return `<b>${a.name}</b> ${a.readiness}% vs <b>${b.name}</b> ${b.readiness}%. ${a.readiness>b.readiness?a.name:b.name} leads on readiness; ${a.leadership>b.leadership?a.name:b.name} on leadership (${Math.max(a.leadership,b.leadership)}%).`;}}
  const e=findEmpInText(q);
  if(e){
    if(fuzzyIncludes(lq,'why')||lq.includes("isn't")||lq.includes('not ready')){return `${e.name} is <b>${e.decision}</b> (${e.readiness}%). ${e.compliance?'There is an open <b>compliance flag</b> — a hard block regardless of score. ':''}${e.trend==='falling'?'Trajectory is <b>declining</b>. ':''}Weakest areas: ${e.skillGaps.map(g=>g.d+' ('+g.v+'%)').join(', ')}.`;}
    if(fuzzyIncludes(lq,'evidence')){return `Evidence for <b>${e.name}</b>: ${e.evals} quality evaluations (avg ${e.q}%), coaching impact ${e.coachingImpact>0?'+':''}${e.coachingImpact} pts, tenure ${e.tenure} mo, confidence ${e.conf}%. Live sources: evaluations + coaching. CSAT, certifications &amp; attendance are mock pending integration.`;}
    if(fuzzyIncludes(lq,'improve')||fuzzyIncludes(lq,'develop')){return `${e.name} should focus on: ${e.skillGaps.map(g=>g.d).join(', ')}. I can route these to the Learning Workspace.`;}
    return `${e.name} — ${e.cur} → ${e.tgt}. Readiness ${e.readiness}% (${e.decision}), leadership ${e.leadership}%, confidence ${e.conf}%.`;
  }
  const guess=guessName(q);
  const fuzzy=fuzzyFindEmp(guess);
  if(fuzzy){
    const corrected=guess?q.replace(new RegExp(guess.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i'),fuzzy.name):fuzzy.name;
    return `__DIDYOUMEAN__I couldn't find "${escHtml(guess||q)}." Did you mean <b>${fuzzy.name}</b>?|||${corrected}`;
  }
  // A name-like guess was extracted but genuinely matches no one — say so specifically, rather than a generic non-answer
  if(guess)return `__REDIRECT__I don't have anyone matching "${escHtml(guess)}" in this view.`;
  return `__REDIRECT__I don't have an answer for that yet — I can only speak from the evidence I actually have.`;
}

function openExport(){document.getElementById('modalOverlay').classList.add('show');const m=document.getElementById('modal');m.classList.add('show');
  m.innerHTML=`<div class="mh">Export Center <button class="iconbtn" onclick="closeModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>
  <div class="mb">${[['Promotion Packet','Full evidence-backed case for one employee','promotion'],['Talent Review','Nine-box + succession for a team','talent'],['Executive Report','Workforce KPIs & trends','workforce'],['Employee Profile','Complete profile export','employee'],['Career Report','Pathing & recommendations','career']].map(([t,d,ic])=>`<div class="exp-item" onclick="doExport('${t}')"><div class="li-ic">${icon(ic,16)}</div><div><div class="li-t">${t}</div><div class="li-s">${d}</div></div></div>`).join('')}</div>`;}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');document.getElementById('modal').classList.remove('show');}
function doExport(t){closeModal();if(t==='Promotion Packet'){promoSub='packet';go('promotion');toast('Opened Promotion Packet — use Print/Save PDF');}else toast(t+' generated (mock)');}

// theme + toast
function toggleTheme(){const r=document.documentElement;const cur=r.getAttribute('data-theme');const next=cur==='dark'?'light':'dark';r.setAttribute('data-theme',next);try{localStorage.setItem('pip-theme',next);}catch(e){}}
(function(){let s=null;try{s=localStorage.getItem('pip-theme');}catch(e){}if(s)document.documentElement.setAttribute('data-theme',s);else if(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark');})();
let toastT;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}

// role switch — now genuinely role-aware (filters workspaces per permission matrix)
document.getElementById('roleSel').addEventListener('change',e=>setRole(e.target.value));

/* ============================================================= BOOT ============================================================= */
document.getElementById('roleSel').value=viewRole;
updateUser();
renderNav();render();
</script>
